<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130" fill="none">
  <defs>

    <!-- Vibrant brand gradient: electric cyan → vivid violet -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00C6FF"/>
      <stop offset="45%"  stop-color="#5B5EF4"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Bright accent gradient for "Ease" -->
    <linearGradient id="easeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Icon cover gradient: bold saturated -->
    <linearGradient id="coverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0EA5E9"/>
      <stop offset="50%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Spine gradient: deeper for contrast -->
    <linearGradient id="spineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>

    <!-- Underline gradient -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00C6FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Glow filter for icon — stronger -->
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for checkmark -->
    <filter id="checkGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong text shadow for legibility -->
    <filter id="textShadow" x="-8%" y="-8%" width="125%" height="145%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4338CA" flood-opacity="0.35"/>
    </filter>

    <!-- Glow behind "Book" text -->
    <filter id="bookGlow" x="-10%" y="-20%" width="130%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ease text glow -->
    <filter id="easeGlow" x="-10%" y="-20%" width="130%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for book interior -->
    <clipPath id="bookClip">
      <rect x="20" y="12" width="68" height="96" rx="6"/>
    </clipPath>

    <!-- Outer glow halo behind icon -->
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ═══════════ ICON ═══════════ -->

  <!-- Halo glow behind book -->
  <rect x="14" y="10" width="76" height="100" rx="10"
        fill="url(#coverGrad)" opacity="0.25" filter="url(#halo)"/>

  <!-- Book drop shadow -->
  <rect x="16" y="18" width="68" height="96" rx="7"
        fill="#1E1B4B" opacity="0.45"/>

  <!-- Book back layer -->
  <rect x="12" y="13" width="68" height="96" rx="7"
        fill="url(#coverGrad)" opacity="0.45"/>

  <!-- Spine -->
  <rect x="12" y="13" width="13" height="96" rx="5"
        fill="url(#spineGrad)"/>
  <!-- Spine highlight shine -->
  <rect x="15" y="13" width="3" height="96"
        fill="white" opacity="0.22"/>

  <!-- Front cover — full saturated gradient -->
  <rect x="22" y="11" width="58" height="96" rx="6"
        fill="url(#coverGrad)" filter="url(#iconGlow)"/>

  <!-- Cover shine highlight top-left -->
  <path d="M28,13 Q50,11 78,15 L78,30 Q55,22 28,26 Z"
        fill="white" opacity="0.14"/>

  <!-- Page lines -->
  <g clip-path="url(#bookClip)">
    <rect x="30" y="26" width="42" height="62" rx="3" fill="white" opacity="0.10"/>
    <line x1="34" y1="36" x2="72" y2="36" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.65"/>
    <line x1="34" y1="45" x2="72" y2="45" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.55"/>
    <line x1="34" y1="54" x2="72" y2="54" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.50"/>
    <line x1="34" y1="63" x2="58" y2="63" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.40"/>
  </g>

  <!-- Bookmark ribbon — bright white with cyan tint -->
  <polygon points="60,11 68,11 68,36 64,30 60,36"
           fill="white" opacity="0.95"/>
  <polygon points="61,11 67,11 67,15 64,13 61,15"
           fill="#00C6FF" opacity="0.7"/>

  <!-- Checkmark circle -->
  <circle cx="51" cy="76" r="13"
          fill="white" opacity="0.18" filter="url(#checkGlow)"/>
  <circle cx="51" cy="76" r="11"
          fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- Checkmark tick — bright, glowing -->
  <polyline points="45,76 49.5,81.5 58,69"
            stroke="white" stroke-width="3.2"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none" filter="url(#checkGlow)" opacity="1"/>

  <!-- ═══════════ WORDMARK ═══════════ -->

  <!-- "Book" — bold gradient, glowing -->
  <text
    x="106" y="76"
    font-family="'Playfair Display', 'Palatino Linotype', 'Book Antiqua', Georgia, serif"
    font-size="56"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#brandGrad)"
    filter="url(#bookGlow)"
  >Book</text>

  <!-- "Ease" — vivid cyan, distinct from Book -->
  <text
    x="262" y="76"
    font-family="'Playfair Display', 'Palatino Linotype', 'Book Antiqua', Georgia, serif"
    font-size="56"
    font-weight="400"
    letter-spacing="-0.5"
    fill="url(#easeGrad)"
    filter="url(#easeGlow)"
  >Ease</text>

  <!-- Underline accent — full width, vibrant gradient, thicker -->
  <line x1="106" y1="84" x2="420" y2="84"
        stroke="url(#lineGrad)" stroke-width="3"
        stroke-linecap="round" opacity="0.75"/>

  <!-- Dot separator between Book and Ease -->
  <circle cx="257" cy="76" r="3.5" fill="#A855F7" opacity="0.85"/>

  <!-- Tagline — brighter, more visible -->
  <text
    x="106" y="103"
    font-family="'DM Sans', 'Trebuchet MS', Arial, sans-serif"
    font-size="11"
    font-weight="600"
    letter-spacing="4"
    fill="#818CF8"
    opacity="1"
  >BOOKING · SIMPLIFIED</text>

</svg>
