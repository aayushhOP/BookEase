<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120" fill="none">
  <defs>

    <!-- Main brand gradient: deep teal to vibrant indigo -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0EA5C9"/>
      <stop offset="55%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Icon inner page gradient -->
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#E0F7FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#BAE6FD" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Soft glow for icon -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow for text -->
    <filter id="textShadow" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#6366F1" flood-opacity="0.18"/>
    </filter>

    <!-- Clip for book shape -->
    <clipPath id="bookClip">
      <rect x="8" y="14" width="76" height="92" rx="7"/>
    </clipPath>

  </defs>

  <!-- ═══════════════════════════════ ICON ═══════════════════════════════ -->

  <!-- Book shadow / base -->
  <rect x="12" y="20" width="70" height="84" rx="6"
        fill="url(#brandGrad)" opacity="0.18"/>

  <!-- Book back cover -->
  <rect x="10" y="16" width="70" height="86" rx="7"
        fill="url(#brandGrad)" opacity="0.35"/>

  <!-- Book spine accent -->
  <rect x="10" y="16" width="10" height="86" rx="4"
        fill="url(#brandGrad)" opacity="0.9"/>
  <rect x="14" y="16" width="3" height="86"
        fill="white" opacity="0.15"/>

  <!-- Book front cover -->
  <rect x="18" y="14" width="62" height="88" rx="6"
        fill="url(#brandGrad)" filter="url(#glow)"/>

  <!-- Page lines inside book -->
  <g clip-path="url(#bookClip)">
    <rect x="26" y="28" width="46" height="60" rx="3" fill="white" opacity="0.12"/>
    <line x1="30" y1="38" x2="66" y2="38" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="30" y1="46" x2="66" y2="46" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
    <line x1="30" y1="54" x2="66" y2="54" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
    <line x1="30" y1="62" x2="55" y2="62" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Bookmark ribbon -->
  <polygon points="56,14 63,14 63,36 59.5,31 56,36"
           fill="white" opacity="0.85"/>

  <!-- Checkmark / ease tick on cover — signals "easy booking" -->
  <g filter="url(#glow)">
    <circle cx="49" cy="72" r="11" fill="white" opacity="0.2"/>
    <polyline points="43,72 47.5,77 56,66"
              stroke="white" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"
              fill="none" opacity="0.95"/>
  </g>

  <!-- ═══════════════════════════════ WORDMARK ══════════════════════════ -->

  <!-- Import a refined serif+geometric feel via embedded path text -->
  <!-- Using SVG text with Google Fonts fallback stack -->
  <text
    x="102" y="73"
    font-family="'Playfair Display', 'Palatino Linotype', 'Book Antiqua', Georgia, serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#brandGrad)"
    filter="url(#textShadow)"
  >Book</text>

  <text
    x="248" y="73"
    font-family="'Playfair Display', 'Palatino Linotype', 'Book Antiqua', Georgia, serif"
    font-size="52"
    font-weight="400"
    letter-spacing="-0.5"
    fill="#0EA5C9"
    filter="url(#textShadow)"
  >Ease</text>

  <!-- Thin underline accent under "Ease" — signals simplicity/flow -->
  <line x1="248" y1="80" x2="400" y2="80"
        stroke="url(#brandGrad)" stroke-width="2.2"
        stroke-linecap="round" opacity="0.55"/>

  <!-- Tiny tagline -->
  <text
    x="102" y="95"
    font-family="'DM Sans', 'Trebuchet MS', sans-serif"
    font-size="10.5"
    font-weight="400"
    letter-spacing="3.5"
    fill="#6366F1"
    opacity="0.7"
  >BOOKING · SIMPLIFIED</text>

</svg>
